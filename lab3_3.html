<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Калькулятор</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: system-ui, sans-serif;
            background: #e4e4e7;
            color: #18181b;
        }

        .calc {
            width: min(100% - 2rem, 280px);
            padding: 1rem;
            border-radius: 12px;
            background: #fafafa;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
        }

        .calc h1 {
            margin: 0 0 0.75rem;
            font-size: 1rem;
            font-weight: 600;
            text-align: center;
            color: #52525b;
        }

        #display {
            width: 100%;
            padding: 0.65rem 0.75rem;
            font-size: 1.35rem;
            font-variant-numeric: tabular-nums;
            text-align: right;
            border: 1px solid #d4d4d8;
            border-radius: 8px;
            background: #fff;
            margin-bottom: 0.75rem;
        }

        #display:focus {
            outline: 2px solid #2563eb;
            outline-offset: 1px;
        }

        .keys {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.4rem;
        }

        .keys button {
            font: inherit;
            font-size: 1rem;
            font-weight: 600;
            padding: 0.65rem 0;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: #e4e4e7;
            color: #18181b;
        }

        .keys button:hover {
            background: #d4d4d8;
        }

        .keys button:active {
            transform: scale(0.97);
        }

        .keys .op {
            background: #dbeafe;
            color: #1e40af;
        }

        .keys .op:hover {
            background: #bfdbfe;
        }

        .keys .eq {
            background: #2563eb;
            color: #fff;
            grid-column: span 2;
        }

        .keys .eq:hover {
            background: #1d4ed8;
        }

        .keys .clear {
            background: #fecaca;
            color: #991b1b;
        }

        .keys .clear:hover {
            background: #fca5a5;
        }
    </style>
</head>

<body>
    <div class="calc">
        <h1>Калькулятор</h1>
        <input type="text" id="display" readonly value="" inputmode="none" autocomplete="off"
            aria-label="Результат и выражение">
        <div class="keys" role="group" aria-label="Кнопки калькулятора">
            <button type="button" class="op" data-append="(">(</button>
            <button type="button" class="op" data-append=")">)</button>
            <button type="button" class="clear" data-action="clear">C</button>
            <button type="button" class="op" data-append="/">/</button>

            <button type="button" data-append="7">7</button>
            <button type="button" data-append="8">8</button>
            <button type="button" data-append="9">9</button>
            <button type="button" class="op" data-append="*">*</button>

            <button type="button" data-append="4">4</button>
            <button type="button" data-append="5">5</button>
            <button type="button" data-append="6">6</button>
            <button type="button" class="op" data-append="-">-</button>

            <button type="button" data-append="1">1</button>
            <button type="button" data-append="2">2</button>
            <button type="button" data-append="3">3</button>
            <button type="button" class="op" data-append="+">+</button>

            <button type="button" data-append="0">0</button>
            <button type="button" class="eq" data-action="equals">=</button>
        </div>
    </div>

    <script src="lab3_3.js"></script>
</body>

</html>
