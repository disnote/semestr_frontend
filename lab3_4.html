<!DOCTYPE html>
<html lang="ru">

<head>
    <title>Магазин</title>
    <style>
        html,
        body {
            user-select: none;
            -webkit-user-select: none;
            font-family: "Times New Roman", Times, serif;
            background: #fff;
            color: #000;
        }

        h1 {
            font-family: "Times New Roman", Times, serif;
        }

        table {
            border-collapse: collapse;
            border: 1px solid #000;
            margin-top: 1em;
            background-color: #00ffff;
        }

        th,
        td {
            border: 1px solid #000;
            padding: 6px 10px;
            background-color: #00ffff;
        }
    </style>
</head>

<body>
    <h1>Добро пожаловать!</h1>
    <p>
        <i style="color: #c00;">Приветст</i><i style="color: #00c;">вуем</i>
        <u style="color: #c00;">вас</u>
        <strong style="color: #00c; font-weight: bold;">в</strong>
        <strong style="color: #c00; font-weight: bold;">нашем</strong>
        <u style="color: #00c;">магазине!</u>
    </p>
    <p>
        &lt;h1&gt;Теорема Пифагора&lt;/h1&gt;: c<sup>2</sup> = a<sup>2</sup> + b<sup>2</sup>
    </p>
    <table>
        <tr>
            <td colspan="2">Информация</td>
        </tr>
        <tr>
            <td>Старая цена: <s>1000&nbsp;₽</s></td>
            <td>Новая цена: 500 ₽</td>
        </tr>
    </table>
    <script src="lab3_1.js"></script>
</body>

</html>
