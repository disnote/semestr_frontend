<!DOCTYPE html>
<html lang="ru">

<head>
    <title>Магазин</title>
    <style>
        html,
        body {
            margin: 1.25rem;
            align-items: center;
            justify-content: center;
            font-family: system-ui, sans-serif;
            background: #ffffff;
        }

        table {
            border-collapse: collapse;
            border: 1px solid #000;
            margin-top: 1em;
        }

        th,
        td {
            border: 1px solid #000;
            padding: 6px 10px;
        }

        .theorema {
            user-select: none;
            -webkit-user-select: none;
        }
    </style>
</head>

<body>
    <h1>Добро пожаловать!</h1>
    <p>
        <i>Приветствуем</i> <u>вас</u> <strong>в нашем</strong>
        <a href="https://ya.ru">магазине!</a>
    </p>
    <p class="theorema">
        &lt;h1&gt;Теорема Пифагора&lt;/h1&gt;: c<sup>2</sup> = a<sup>2</sup> + b<sup>2</sup>
    </p>
    <table>
        <tr>
            <td colspan="2">Информация</td>
        </tr>
        <tr>
            <td>Старая цена: <s>1000</s> ₽</td>
            <td>Новая цена: 500 ₽</td>
        </tr>
    </table>
    <script src="lab3_1.js"></script>
</body>

</html>
