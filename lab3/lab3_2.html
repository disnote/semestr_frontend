<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кликер</title>
    <style>
        body {
            font-family: system-ui, sans-serif;
            min-height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1.5rem;
            background: #f4f4f5;
            color: #18181b;
        }

        h1 {
            font-size: 1.25rem;
            font-weight: 600;
            margin: 0;
        }

        .counter {
            font-size: 3rem;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
            line-height: 1;
        }

        .rate {
            margin: 0;
            font-size: 0.95rem;
            color: #52525b;
            font-variant-numeric: tabular-nums;
        }

        button {
            font: inherit;
            font-size: 1rem;
            font-weight: 600;
            padding: 0.65rem 1.5rem;
            border: none;
            border-radius: 0.5rem;
            background: #2563eb;
            color: #fff;
            cursor: pointer;
        }

        button:hover {
            background: #1d4ed8;
        }

        button:active {
            transform: scale(0.98);
        }
    </style>
</head>

<body>
    <h1>Clicker</h1>
    <div class="counter" id="counter" aria-live="polite">0</div>
    <p class="rate" id="rate-line" aria-live="polite">
        Среднее: <span id="rate">0.00</span> кл/с
    </p>
    <button type="button" id="click-btn">Clicks me</button>

    <script src="lab3_2.js"></script>
</body>

</html>
